<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Fylo data storage component</title>

  <link rel="stylesheet" href="./assets/css/style.css">


</head>

<body>

  <main class="container">

    <section class="cards">

      <div class="card fylo">
        <header>
          <img src="./assets/images/logo.svg" alt="logo svg">
        </header>

        <div class="svg-items">
          <div><img src="./assets/images/icon-document.svg" alt="icon svg"></div>
          <div><img src="./assets/images/icon-folder.svg" alt="icon svg"></div>
          <div><img src="./assets/images/icon-upload.svg" alt="icon svg"></div>
        </div>
      </div>

      <div class="card storage">

        <p>
          You’ve used <span>815 GB</span> of your storage
        </p>

        <div class="bar-track">
          <div class="bar-fill"></div>
        </div>

        <div class="bar-labels">
          <span>0 GB</span>
          <span>1000 GB</span>
        </div>

        <div class="gb-left">
          <p>
            <span>185</span>
            GB Left
          </p>
        </div>

      </div>
    </section>

  </main>

  <h3>hola mundo</h3>

  <footer>
    <p class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="https://github.com/PhilivG">Juan Felipe Valencia</a>.
    </p>
  </footer>
</body>

</html>
